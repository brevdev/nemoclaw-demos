#
# Network policy additions for the Hermes + Omni + NemoClaw cookbook.
#
# Add these two blocks to the `network_policies:` section of your sandbox
# policy (see Part 5 of hermes-omni-guide.md for the export-edit-apply steps).
#
# What they enforce:
#   wikipedia       — Wikipedia REST summary API + search API, python3 only
#   free_dictionary — Free Dictionary API (entry endpoints), python3 only
#
# Both are path-restricted: raw /wiki/ pages remain blocked, and curl/wget/node
# cannot reach either host. Everything else stays deny-by-default.

  wikipedia:
    name: wikipedia
    endpoints:
      - host: en.wikipedia.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/api/rest_v1/page/summary/**" }
          - allow: { method: GET, path: "/w/api.php" }
    binaries:
      - { path: /usr/bin/python3.11 }

  free_dictionary:
    name: free_dictionary
    endpoints:
      - host: api.dictionaryapi.dev
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/api/v2/entries/**" }
    binaries:
      - { path: /usr/bin/python3.11 }
