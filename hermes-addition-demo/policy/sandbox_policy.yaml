version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /sandbox/.openclaw
  read_write:
    - /sandbox
    - /sandbox/.openclaw-data
    - /tmp
    - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: full
      - host: statsig.anthropic.com
        port: 443
      - host: sentry.io
        port: 443
      - host: raw.githubusercontent.com
        port: 443
      - host: platform.claude.com
        port: 443
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/local/bin/node
      - path: /usr/bin/node
  uv_install:
    name: uv_install
    endpoints:
      - { host: astral.sh, port: 443 }
      - { host: github.com, port: 443 }
      - { host: objects.githubusercontent.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /bin/curl }
      - { path: /bin/sh }
      - { path: /bin/bash }
      - { path: /usr/bin/bash }
  pypi:
    name: pypi
    endpoints:
      - { host: pypi.org, port: 443 }
      - { host: files.pythonhosted.org, port: 443 }
      - { host: github.com, port: 443 }
      - { host: objects.githubusercontent.com, port: 443 }
      - { host: api.github.com, port: 443 }
      - { host: downloads.python.org, port: 443 }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.11 }
      - { path: /usr/bin/curl }
      - { path: /bin/curl }
      - { path: /bin/sh }
      - { path: /bin/bash }
      - { path: /usr/bin/bash }
      - { path: /usr/local/bin/uv }
      - { path: "/sandbox/.local/bin/uv" }
      - { path: "/sandbox/.cargo/bin/uv" }
      - { path: "/sandbox/.uv/python/**" }
      - { path: "/sandbox/.venv/bin/python" }
      - { path: "/sandbox/.venv/bin/python3" }
      - { path: "/sandbox/.venv/bin/pip" }
      - { path: "/sandbox/.hermes/hermes-agent/.venv/bin/python" }
      - { path: "/sandbox/.hermes/hermes-agent/.venv/bin/python3" }
      - { path: "/sandbox/.hermes/hermes-agent/.venv/bin/pip" }
      - { path: "/sandbox/.hermes/hermes-agent/.venv/bin/uv" }
      - { path: "/sandbox/.openclaw/workspace/skills/*/venv/bin/python" }
      - { path: "/sandbox/.openclaw/workspace/skills/*/venv/bin/python3" }
      - { path: "/sandbox/.openclaw/workspace/skills/*/venv/bin/pip" }
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/**/info/refs*"
          - allow:
              method: POST
              path: "/**/git-upload-pack"
      - { host: objects.githubusercontent.com, port: 443 }
    binaries:
      - { path: /usr/bin/git }
      - { path: /bin/bash }
      - { path: /bin/sh }
  github_rest_api:
    name: github-rest-api
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/**"
          - allow:
              method: HEAD
              path: "/**"
          - allow:
              method: OPTIONS
              path: "/**"
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/gh }
  nodejs_install:
    name: nodejs_install
    endpoints:
      - { host: nodejs.org, port: 443 }
      - { host: deb.nodesource.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /bin/curl }
      - { path: /bin/sh }
      - { path: /bin/bash }
      - { path: /usr/bin/bash }
  npm:
    name: npm
    endpoints:
      - { host: registry.npmjs.org, port: 443 }
    binaries:
      - { path: /usr/bin/npm }
      - { path: /usr/local/bin/npm }
      - { path: "/sandbox/.local/bin/npm" }
      - { path: "/sandbox/.hermes/node/bin/npm" }
      - { path: "/sandbox/.hermes/node/bin/node" }
  hermes_inference:
    name: hermes_inference
    endpoints:
      - { host: inference.local, port: 443 }
    binaries:
      - { path: "/sandbox/hermes-agent/venv/bin/python3" }
      - { path: "/sandbox/hermes-agent/venv/bin/python" }
      - { path: "/sandbox/.hermes/hermes-agent/venv/bin/python3" }
      - { path: "/sandbox/.hermes/hermes-agent/venv/bin/python" }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/node }
